<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Threads Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#1a1a1a;--border:#222;--border2:#333;--text:#f0f0f0;--muted:#666;--accent:#e8ff47;--accent2:#47ffe8;--danger:#ff4747;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
header{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem}
.logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo svg{width:20px;height:20px}
h1{font-size:1.1rem;font-weight:500;letter-spacing:-0.02em}
h1 span{color:var(--accent);font-family:'DM Mono',monospace}
.badge{font-size:10px;font-family:'DM Mono',monospace;background:var(--surface2);border:1px solid var(--border2);padding:2px 8px;border-radius:4px;color:var(--muted);margin-left:auto}
main{max-width:900px;margin:0 auto;padding:2rem}
.search-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.search-row{display:flex;gap:8px;margin-bottom:1rem}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.btn-search{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.2s;white-space:nowrap}
.btn-search:hover{opacity:0.85}
.btn-search:disabled{opacity:0.4;cursor:not-allowed}
.filters{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.filter-group label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.08em}
.filter-group select,.filter-group input[type=date],.filter-group input[type=number]{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.filter-group select:focus,.filter-group input:focus{border-color:var(--accent)}
.filter-group select option{background:var(--surface2)}
.status{display:none;align-items:center;gap:10px;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:1rem;font-size:13px;color:var(--muted)}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-bar{display:none;justify-content:space-between;align-items:center;margin-bottom:1rem;padding:0.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.stats-left{font-size:13px;color:var(--muted)}
.stats-left strong{color:var(--accent);font-family:'DM Mono',monospace}
.btn-export{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.2s}
.btn-export:hover{border-color:var(--accent);color:var(--accent)}
.posts-grid{display:flex;flex-direction:column;gap:10px}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:border-color 0.2s;position:relative;overflow:hidden}
.post-card:hover{border-color:var(--border2)}
.post-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s}
.post-card:hover::before{opacity:1}
.post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;gap:1rem}
.post-user{font-size:13px;font-family:'DM Mono',monospace;color:var(--accent2)}
.post-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap}
.post-text{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:1rem;word-break:break-word}
.post-metrics{display:flex;gap:1.5rem}
.metric{display:flex;align-items:center;gap:5px;font-size:12px;font-family:'DM Mono',monospace}
.metric-icon{width:14px;height:14px;opacity:0.5}
.metric-val{color:var(--text)}
.metric-label{color:var(--muted)}
.metric.top .metric-val{color:var(--accent);font-weight:600}
.rank{position:absolute;top:12px;right:12px;width:24px;height:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)}
.rank.gold{background:rgba(232,255,71,0.1);border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty p{font-size:14px;margin-top:0.5rem}
.error-msg{background:rgba(255,71,71,0.08);border:1px solid rgba(255,71,71,0.2);border-radius:10px;padding:1rem;font-size:13px;color:var(--danger);margin-bottom:1rem;display:none}
@media(max-width:600px){.filters{grid-template-columns:1fr 1fr}main{padding:1rem}header{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="10" r="8" stroke="#000" stroke-width="2"/>
      <path d="M7 10h6M10 7v6" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Threads <span>Scanner</span></h1>
  <div class="badge">real-time scraper</div>
</header>
<main>
  <div class="search-panel">
    <div class="search-row">
      <input class="search-input" id="queryInput" type="text" placeholder="Поисковое слово или фраза..." autocomplete="off"/>
      <button class="btn-search" id="searchBtn" onclick="doSearch()">Искать</button>
    </div>
    <div class="filters">
      <div class="filter-group">
        <label>Сортировка</label>
        <select id="sortSelect">
          <option value="top">По популярности</option>
          <option value="recent">По времени</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Лимит</label>
        <input type="number" id="limitInput" value="20" min="5" max="100"/>
      </div>
      <div class="filter-group">
        <label>Дата от</label>
        <input type="date" id="dateFrom"/>
      </div>
      <div class="filter-group">
        <label>Дата до</label>
        <input type="date" id="dateTo"/>
      </div>
    </div>
  </div>
  <div class="status" id="status">
    <div class="spinner"></div>
    <span id="statusText">Открываю Threads...</span>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="stats-bar" id="statsBar">
    <div class="stats-left">Найдено: <strong id="totalCount">0</strong> постов</div>
    <button class="btn-export" onclick="exportCSV()">↓ Экспорт CSV</button>
  </div>
  <div class="posts-grid" id="postsGrid"></div>
</main>
<script>
let lastResults=[];
function formatDate(iso){if(!iso)return'—';try{const d=new Date(iso);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}catch{return iso;}}
function formatNum(n){if(n===undefined||n===null)return'0';if(n>=1000)return(n/1000).toFixed(1)+'k';return String(n);}
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderPost(post,rank){const isTop=rank===1;return`<div class="post-card"><div class="rank ${isTop?'gold':''}">${rank}</div><div class="post-header"><span class="post-user">${post.username?'@'+post.username:'threads'}</span><span class="post-time">${formatDate(post.timestamp)}</span></div><div class="post-text">${escHtml(post.text)}</div><div class="post-metrics"><div class="metric ${isTop?'top':''}"><svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg><span class="metric-val">${formatNum(post.like_count)}</span><span class="metric-label">лайков</span></div><div class="metric"><svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span class="metric-val">${formatNum(post.reply_count)}</span><span class="metric-label">ответов</span></div><div class="metric"><svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg><span class="metric-val">${formatNum(post.repost_count)}</span><span class="metric-label">репостов</span></div></div></div>`;}
const statusMsgs=['Открываю Threads...','Загружаю страницу поиска...','Перехватываю GraphQL запросы...','Скроллю для загрузки постов...','Фильтрую и сортирую результаты...'];
let statusInterval;
async function doSearch(){const q=document.getElementById('queryInput').value.trim();if(!q){document.getElementById('queryInput').focus();return;}const sort=document.getElementById('sortSelect').value;const limit=document.getElementById('limitInput').value||20;const dateFrom=document.getElementById('dateFrom').value;const dateTo=document.getElementById('dateTo').value;document.getElementById('searchBtn').disabled=true;document.getElementById('searchBtn').textContent='Ищу...';document.getElementById('status').style.display='flex';document.getElementById('statsBar').style.display='none';document.getElementById('postsGrid').innerHTML='';document.getElementById('errorMsg').style.display='none';let si=0;document.getElementById('statusText').textContent=statusMsgs[0];statusInterval=setInterval(()=>{si=(si+1)%statusMsgs.length;document.getElementById('statusText').textContent=statusMsgs[si];},2000);try{let url=`/api/search?q=${encodeURIComponent(q)}&sort=${sort}&limit=${limit}`;if(dateFrom)url+=`&date_from=${dateFrom}`;if(dateTo)url+=`&date_to=${dateTo}`;const resp=await fetch(url);const data=await resp.json();clearInterval(statusInterval);document.getElementById('status').style.display='none';if(data.error){document.getElementById('errorMsg').textContent=data.error;document.getElementById('errorMsg').style.display='block';}else{lastResults=data.posts||[];document.getElementById('totalCount').textContent=data.total;document.getElementById('statsBar').style.display='flex';if(lastResults.length===0){document.getElementById('postsGrid').innerHTML=`<div class="empty"><div style="font-size:2rem;margin-bottom:0.5rem">🔍</div><p>Постов не найдено. Попробуй другой запрос.</p></div>`;}else{document.getElementById('postsGrid').innerHTML=lastResults.map((p,i)=>renderPost(p,i+1)).join('');}}}catch(e){clearInterval(statusInterval);document.getElementById('status').style.display='none';document.getElementById('errorMsg').textContent='Ошибка соединения с сервером: '+e.message;document.getElementById('errorMsg').style.display='block';}document.getElementById('searchBtn').disabled=false;document.getElementById('searchBtn').textContent='Искать';}
function exportCSV(){if(!lastResults.length)return;const header=['rank','username','text','like_count','reply_count','repost_count','timestamp'];const rows=lastResults.map((p,i)=>[i+1,p.username||'"'+(p.text||'').replace(/"/g,'""')+'"',p.like_count||0,p.reply_count||0,p.repost_count||0,p.timestamp||'']);const csv=[header,...rows].map(r=>r.join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`threads_${document.getElementById('queryInput').value}_${Date.now()}.csv`;a.click();}
document.getElementById('queryInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
